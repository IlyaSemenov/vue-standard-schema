name: Test and Release

env:
  MAIN_REF: refs/heads/main
  # For jdx/mise-action@v3, see https://github.com/jdx/mise-action/issues/394
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["**"]

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Publish to npm with OIDC
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  test-and-release:
    name: Test and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v3

      # for changeset publish
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Test packages
        run: bun run test

      - name: Capture new release versions
        if: ${{ github.ref == env.MAIN_REF }}
        run: |
          if bunx @changesets/cli status --output=/tmp/release.json; then
            echo "RELEASE=Version $(jq -r '.releases[0].newVersion' /tmp/release.json)" >> "$GITHUB_ENV"
          fi

      - name: Create Release Pull Request or Publish to npm
        if: ${{ github.ref == env.MAIN_REF }}
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          title: ${{ env.RELEASE }}
          commit: ${{ env.RELEASE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
